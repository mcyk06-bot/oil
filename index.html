<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>流体オブジェ シミュレーター</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
  }
  h1 {
    color: #88ccff;
    margin-bottom: 20px;
    font-size: 1.2em;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .container {
    position: relative;
    width: 800px;
    height: 300px;
  }
  canvas {
    border-radius: 12px;
    box-shadow:
      0 0 40px rgba(0,120,255,0.4),
      0 0 80px rgba(0,80,200,0.2),
      inset 0 0 30px rgba(0,0,0,0.5);
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ctrl {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    color: #88ccff;
    font-size: 0.75em;
  }
  input[type=range] {
    width: 120px;
    accent-color: #4499ff;
  }
  .btn {
    background: rgba(0,100,255,0.2);
    color: #88ccff;
    border: 1px solid #4499ff;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8em;
    transition: all 0.2s;
  }
  .btn:hover { background: rgba(0,100,255,0.5); }
</style>
</head>
<body>
<h1>🌊 Fluid Object Simulator</h1>
<div class="container">
  <canvas id="c" width="800" height="300"></canvas>
</div>

<div class="controls">
  <div class="ctrl">
    <span>傾き速度</span>
    <input type="range" id="tiltSpeed" min="0.1" max="3" step="0.1" value="0.6">
  </div>
  <div class="ctrl">
    <span>傾き角度</span>
    <input type="range" id="tiltAngle" min="5" max="40" step="1" value="18">
  </div>
  <div class="ctrl">
    <span>波の激しさ</span>
    <input type="range" id="waveIntensity" min="0.1" max="3" step="0.1" value="1.0">
  </div>
  <div class="ctrl">
    <span>粘度</span>
    <input type="range" id="viscosity" min="0.1" max="1.0" step="0.05" value="0.55">
  </div>
  <div class="ctrl">
    <span>渦の強さ</span>
    <input type="range" id="vortexStr" min="0" max="3" step="0.1" value="1.2">
  </div>
  <button class="btn" onclick="addShake()">💥 シェイク！</button>
  <button class="btn" onclick="toggleObjects()">🚢 オブジェ表示</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── パラメータ ──────────────────────────
let TILT_SPEED    = 0.6;
let TILT_ANGLE    = 18;
let WAVE_INTENSITY= 1.0;
let VISCOSITY     = 0.55;
let VORTEX_STR    = 1.2;
let showObjects   = true;
let shakeEnergy   = 0;

document.getElementById('tiltSpeed').oninput    = e => TILT_SPEED     = +e.target.value;
document.getElementById('tiltAngle').oninput    = e => TILT_ANGLE      = +e.target.value;
document.getElementById('waveIntensity').oninput= e => WAVE_INTENSITY  = +e.target.value;
document.getElementById('viscosity').oninput    = e => VISCOSITY       = +e.target.value;
document.getElementById('vortexStr').oninput    = e => VORTEX_STR      = +e.target.value;

function addShake(){ shakeEnergy = 8; }
function toggleObjects(){ showObjects = !showObjects; }

// ── 流体シミュレーション（1D Wave + SPH風粒子） ──
const N = 120; // 水面分割数
const waterSurface = new Float32Array(N); // 高さ
const waterVel     = new Float32Array(N); // 速度
const oilSurface   = new Float32Array(N); // オイル層の高さ
const oilVel       = new Float32Array(N);

// 渦パーティクル
const VORTICES = 6;
const vortex = Array.from({length: VORTICES}, (_, i) => ({
  x: Math.random() * W,
  y: H * 0.5 + (Math.random()-0.5)*60,
  vx: (Math.random()-0.5)*0.8,
  vy: (Math.random()-0.5)*0.4,
  r: 20 + Math.random()*40,
  strength: (Math.random()*2-1) * 0.5,
  life: Math.random()*200
}));

// ── 状態変数 ──
let tiltPhase = 0;
let time = 0;

// ── 波の更新 ──
function updateWave(surf, vel, dt, damping, speed) {
  const c2 = speed * speed;
  for (let i = 1; i < N-1; i++) {
    const accel = c2 * (surf[i-1] + surf[i+1] - 2*surf[i]);
    vel[i] += accel * dt;
    vel[i] *= damping;
  }
  for (let i = 1; i < N-1; i++) surf[i] += vel[i] * dt;
  // 境界
  surf[0] = surf[1]; surf[N-1] = surf[N-2];
  vel[0]  = vel[1];  vel[N-1]  = vel[N-2];
}

// ── 外力（傾き） ──
function applyTilt(surf, vel, tiltAngle) {
  // 傾きによって左右に液体が流れる
  const slope = Math.sin(tiltAngle * Math.PI/180);
  for (let i = 0; i < N; i++) {
    const force = slope * (i/N - 0.5) * 0.8 * WAVE_INTENSITY;
    vel[i] += force;
  }
}

// ── 渦の更新 ──
function updateVortices() {
  for (const v of vortex) {
    v.x += v.vx;
    v.y += v.vy * 0.3;
    v.life++;
    if (v.life > 300 || v.x < -50 || v.x > W+50) {
      v.x = Math.random() * W;
      v.y = H * 0.45 + (Math.random()-0.5)*80;
      v.vx = (Math.random()-0.5)*0.8;
      v.vy = (Math.random()-0.5)*0.3;
      v.r = 20 + Math.random()*50;
      v.strength = (Math.random()*2-1)*0.6;
      v.life = 0;
    }
    // 境界反射
    if (v.x < 30) v.vx = Math.abs(v.vx);
    if (v.x > W-30) v.vx = -Math.abs(v.vx);
  }
}

// ── 描画ユーティリティ ──
function waterColor(depth, oilAmount) {
  // 深さとオイル量で色が変わる
  const b = Math.floor(180 + depth * 20);
  const g = Math.floor(100 + depth * 30 - oilAmount*50);
  const r = Math.floor(20 + oilAmount*80);
  return `rgb(${r},${g},${b})`;
}

// ── 水面パスを構築 ──
function buildSurfacePath(surf, baseY, amp) {
  const path = new Path2D();
  path.moveTo(0, H);
  for (let i = 0; i < N; i++) {
    const x = (i/(N-1)) * W;
    const y = baseY + surf[i] * amp;
    if (i === 0) path.lineTo(x, y);
    else {
      const px = ((i-1)/(N-1))*W;
      const py = baseY + surf[i-1]*amp;
      const cpx = (px+x)/2;
      path.quadraticCurveTo(px+(cpx-px)*0.5, py, cpx, (py+y)/2);
    }
  }
  path.lineTo(W, baseY + surf[N-1]*amp);
  path.lineTo(W, H);
  path.lineTo(0, H);
  path.closePath();
  return path;
}

// ── オブジェ（船・氷山）描画 ──
function drawObjects(waterY, oilY) {
  if (!showObjects) return;

  // 傾き計算
  const tilt = Math.sin(tiltPhase) * TILT_ANGLE;
  const shake = shakeEnergy * (Math.random()-0.5) * 2;

  // ── 氷山 ──
  ctx.save();
  const iceX = W * 0.28 + Math.sin(time*0.3)*3 + shake*0.5;
  const iceY = oilY - 20;
  ctx.translate(iceX, iceY);
  ctx.rotate((tilt * 0.3 + shake) * Math.PI/180);

  // 水中部分
  const iceGradUnder = ctx.createLinearGradient(0,0,0,60);
  iceGradUnder.addColorStop(0,'rgba(180,230,255,0.6)');
  iceGradUnder.addColorStop(1,'rgba(100,160,220,0.3)');
  ctx.fillStyle = iceGradUnder;
  ctx.beginPath();
  ctx.moveTo(-18, 0);
  ctx.lineTo(-28, 55);
  ctx.lineTo(28, 55);
  ctx.lineTo(18, 0);
  ctx.closePath();
  ctx.fill();

  // 水上部分（氷山本体）
  const iceGrad = ctx.createLinearGradient(-20,-60,20,0);
  iceGrad.addColorStop(0,'#f0f8ff');
  iceGrad.addColorStop(0.4,'#d0eaff');
  iceGrad.addColorStop(1,'#a0cce0');
  ctx.fillStyle = iceGrad;
  ctx.beginPath();
  ctx.moveTo(-18, 0);
  ctx.lineTo(-25, -25);
  ctx.lineTo(-10, -45);
  ctx.lineTo(2,  -65);
  ctx.lineTo(14, -40);
  ctx.lineTo(22, -18);
  ctx.lineTo(18, 0);
  ctx.closePath();
  ctx.fill();
  // ハイライト
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-5,-60); ctx.lineTo(-12,-30); ctx.lineTo(-8,-10);
  ctx.stroke();
  ctx.restore();

  // ── 船（タイタニック風） ──
  ctx.save();
  const shipX = W * 0.58 + Math.sin(time*0.25+1)*4 + shake*0.8;
  const shipY = oilY + 5;
  ctx.translate(shipX, shipY);
  ctx.rotate((tilt * 0.6 + shake*1.2) * Math.PI/180);

  // 船体
  const hullGrad = ctx.createLinearGradient(0,-15,0,30);
  hullGrad.addColorStop(0,'#2a3a2a');
  hullGrad.addColorStop(0.5,'#1a2a1a');
  hullGrad.addColorStop(1,'#0a150a');
  ctx.fillStyle = hullGrad;
  ctx.beginPath();
  ctx.moveTo(-80, -10);
  ctx.lineTo(-90, 8);
  ctx.quadraticCurveTo(-70, 28, 0, 26);
  ctx.quadraticCurveTo(70, 28, 88, 8);
  ctx.lineTo(80, -10);
  ctx.closePath();
  ctx.fill();

  // 船体ライン
  ctx.strokeStyle = 'rgba(80,120,80,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-80,-10); ctx.lineTo(80,-10);
  ctx.stroke();

  // 甲板
  ctx.fillStyle = '#3a4a3a';
  ctx.fillRect(-72, -28, 152, 18);

  // 煙突 × 4
  const stackColors = ['#1a1a1a','#1a1a1a','#1a1a1a','rgba(60,60,60,0.5)'];
  const stackX = [-35,-12,11,34];
  for (let i = 0; i < 4; i++) {
    // 煙突本体
    const sg = ctx.createLinearGradient(stackX[i]-6,0,stackX[i]+6,0);
    sg.addColorStop(0,'#333');
    sg.addColorStop(0.5,'#555');
    sg.addColorStop(1,'#222');
    ctx.fillStyle = sg;
    ctx.fillRect(stackX[i]-6, -65, 12, 37);
    // リング（オレンジ）
    ctx.fillStyle = '#cc5500';
    ctx.fillRect(stackX[i]-6, -50, 12, 5);
    ctx.fillRect(stackX[i]-6, -42, 12, 3);
    // 上部
    ctx.fillStyle = '#111';
    ctx.fillRect(stackX[i]-7, -67, 14, 5);
    // 煙
    if (i < 3) {
      ctx.fillStyle = `rgba(80,80,80,${0.06 + Math.sin(time*0.5+i)*0.03})`;
      for (let s = 0; s < 5; s++) {
        const sy = -70 - s*12;
        const sx = stackX[i] + Math.sin(time*0.3+s+i)*4;
        const sr = 5 + s*2.5;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // 上部構造
  ctx.fillStyle = '#2d3d2d';
  ctx.fillRect(-50,-38,100,10);
  ctx.fillStyle = '#354535';
  ctx.fillRect(-30,-46,60,8);

  // 窓
  ctx.fillStyle = 'rgba(255,240,150,0.6)';
  for (let i = -6; i <= 6; i++) {
    ctx.fillRect(i*11-3,-22,5,4);
    ctx.fillRect(i*9-2,-15,4,3);
  }

  // 水線（白帯）
  ctx.fillStyle = 'rgba(200,220,200,0.4)';
  ctx.fillRect(-80,-10,160,3);

  ctx.restore();
}

// ── 渦の可視化 ──
function drawVortices(clipY) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, clipY, W, H - clipY);
  ctx.clip();

  for (const v of vortex) {
    if (v.y < clipY) continue;
    const alpha = Math.min(0.15, Math.abs(v.strength) * 0.2) * VORTEX_STR;
    const grad = ctx.createRadialGradient(v.x, v.y, 0, v.x, v.y, v.r * VORTEX_STR);
    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grad.addColorStop(0.4, `rgba(100,180,255,${alpha*0.5})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(v.x, v.y, v.r * VORTEX_STR * 1.5, 0, Math.PI*2);
    ctx.fill();

    // 渦巻き線
    ctx.strokeStyle = `rgba(150,200,255,${alpha*0.8})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for (let a = 0; a < Math.PI*4; a += 0.05) {
      const spiral_r = (a/(Math.PI*4)) * v.r * VORTEX_STR * (v.strength > 0 ? 1 : -1);
      const sx = v.x + spiral_r * Math.cos(a + time*0.02*v.strength);
      const sy = v.y + spiral_r * Math.sin(a + time*0.02*v.strength) * 0.3;
      a < 0.06 ? ctx.moveTo(sx,sy) : ctx.lineTo(sx,sy);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// ── メインループ ──
function draw() {
  time++;
  tiltPhase += TILT_SPEED * 0.018;

  // 傾き角度（sin波）
  const currentTilt = Math.sin(tiltPhase) * TILT_ANGLE;
  const tiltRad = currentTilt * Math.PI/180;

  // シェイク減衰
  if (shakeEnergy > 0) {
    shakeEnergy *= 0.92;
    const shakeForce = shakeEnergy;
    for (let i = 0; i < N; i++) {
      waterVel[i] += (Math.random()-0.5) * shakeForce * WAVE_INTENSITY;
      oilVel[i]   += (Math.random()-0.5) * shakeForce * WAVE_INTENSITY * 0.6;
    }
  }

  // 傾き外力
  applyTilt(waterVel, waterVel, currentTilt);
  applyTilt(oilVel, oilVel, currentTilt * 0.7);

  // ランダム微小乱流
  if (time % 3 === 0) {
    const ri = Math.floor(Math.random() * (N-2)) + 1;
    waterVel[ri] += (Math.random()-0.5) * 0.15 * WAVE_INTENSITY;
    if (time % 7 === 0) oilVel[ri] += (Math.random()-0.5)*0.2*WAVE_INTENSITY;
  }

  // 波の数値更新
  const damp = 1 - (1-VISCOSITY)*0.03;
  updateWave(waterSurface, waterVel, 1, damp, 0.35);
  updateWave(oilSurface,   oilVel,   1, damp*0.95, 0.25);

  // 渦更新
  updateVortices();

  // ── 描画 ──────────────────────────
  ctx.clearRect(0,0,W,H);

  // 背景（フレーム）
  const bgGrad = ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#1a3a5c');
  bgGrad.addColorStop(1,'#0a1a3a');
  ctx.fillStyle = bgGrad;
  ctx.beginPath();
  ctx.roundRect(0,0,W,H,12);
  ctx.fill();

  // ── 水層の基準Y ──
  const waterBaseY = H * 0.52 + Math.tan(tiltRad) * W * 0.08;
  const oilBaseY   = H * 0.38 + Math.tan(tiltRad) * W * 0.06;
  const waterAmp   = 22 * WAVE_INTENSITY;
  const oilAmp     = 16 * WAVE_INTENSITY;

  // ── 水層（深部） ──
  const waterDeepGrad = ctx.createLinearGradient(0, waterBaseY, 0, H);
  waterDeepGrad.addColorStop(0,'#0055aa');
  waterDeepGrad.addColorStop(0.3,'#0044aa');
  waterDeepGrad.addColorStop(1,'#001a55');
  ctx.fillStyle = waterDeepGrad;
  const waterPath = buildSurfacePath(waterSurface, waterBaseY, waterAmp);
  ctx.fill(waterPath);

  // ── 水中の光の屈折（コースティクス） ──
  ctx.save();
  ctx.clip(waterPath);
  for (let i = 0; i < 8; i++) {
    const lx = W * (0.1 + (i/8)*0.9) + Math.sin(time*0.02+i)*20;
    const lg = ctx.createRadialGradient(lx, waterBaseY+20, 0, lx, waterBaseY+20, 80);
    lg.addColorStop(0,'rgba(100,180,255,0.06)');
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = lg;
    ctx.fillRect(0, waterBaseY, W, H-waterBaseY);
  }
  ctx.restore();

  // 渦の描画（水層内）
  drawVortices(waterBaseY);

  // ── オイル層 ──
  const oilGrad = ctx.createLinearGradient(0, oilBaseY, 0, waterBaseY);
  oilGrad.addColorStop(0, 'rgba(20,100,40,0.75)');
  oilGrad.addColorStop(0.4,'rgba(30,130,60,0.7)');
  oilGrad.addColorStop(0.8,'rgba(20,100,40,0.65)');
  oilGrad.addColorStop(1, 'rgba(10,60,20,0.8)');
  const oilPath = buildSurfacePath(oilSurface, oilBaseY, oilAmp);
  ctx.fillStyle = oilGrad;
  ctx.fill(oilPath);

  // オイル層のテクスチャ（干渉縞）
  ctx.save();
  ctx.clip(oilPath);
  for (let i = 0; i < 5; i++) {
    const lx = W*(0.1+i*0.2) + Math.sin(time*0.015+i*1.3)*30;
    const ilg = ctx.createRadialGradient(lx, oilBaseY+20, 0, lx, oilBaseY+20, 60);
    ilg.addColorStop(0,'rgba(180,255,100,0.08)');
    ilg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = ilg;
    ctx.fillRect(0, oilBaseY, W, waterBaseY-oilBaseY+50);
  }
  ctx.restore();

  // オイルと水の境界（虹色の干渉光）
  const interfaceY = waterBaseY;
  const ifGrad = ctx.createLinearGradient(0,0,W,0);
  for(let i=0;i<=10;i++){
    const hue = (i*36 + time*0.5) % 360;
    ifGrad.addColorStop(i/10, `hsla(${hue},100%,70%,0.15)`);
  }
  ctx.fillStyle = ifGrad;
  const interfaceSurf = waterSurface;
  ctx.beginPath();
  for (let i = 0; i < N; i++) {
    const x = (i/(N-1))*W;
    const y = interfaceY + interfaceSurf[i]*waterAmp;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(200,255,200,0.25)';
  ctx.stroke();

  // ── 空気層（上） ──
  const airGrad = ctx.createLinearGradient(0,0,0,oilBaseY);
  airGrad.addColorStop(0,'rgba(220,240,255,0.15)');
  airGrad.addColorStop(1,'rgba(180,220,255,0.05)');
  ctx.fillStyle = airGrad;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(W,0);
  for (let i = N-1; i >= 0; i--) {
    const x = (i/(N-1))*W;
    const y = oilBaseY + oilSurface[i]*oilAmp;
    ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fill();

  // オイル表面のリップル（細かい高周波波）
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  for (let i = 0; i < N; i++) {
    const x = (i/(N-1))*W;
    const ripple = Math.sin(i*0.8 + time*0.25)*2*WAVE_INTENSITY
                 + Math.sin(i*1.3 + time*0.4)*1*WAVE_INTENSITY;
    const y = oilBaseY + oilSurface[i]*oilAmp + ripple;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();

  // ── オブジェ（船・氷山） ──
  drawObjects(oilBaseY + oilSurface[Math.floor(N*0.28)]*oilAmp,
              oilBaseY + oilSurface[Math.floor(N*0.58)]*oilAmp);

  // ── フレーム枠 ──
  ctx.strokeStyle = 'rgba(100,180,255,0.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(1,1,W-2,H-2,12);
  ctx.stroke();

  // フレーム内側ハイライト
  ctx.strokeStyle = 'rgba(200,240,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(4,4,W-8,H-8,10);
  ctx.stroke();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
